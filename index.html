<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Home Frontier AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-box id="treasure" position="0 0.5 -3" material="color: gold;" 
               animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-box>
        <a-marker-camera preset="hiro"></a-marker-camera>
    </a-scene>

    <div id="ui" style="position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 15px; font-family: sans-serif; border-radius: 10px;">
        Etsi aarre... Valmistaudu vetoon!
    </div>

    <script>
        let lastY = 0;
        let ui = document.getElementById('ui');

        window.addEventListener('devicemotion', (event) => {
            let y = event.accelerationIncludingGravity.y;
            // Tunnistaa nopean puhelimen noston
            if (Math.abs(y - lastY) > 18) { 
                ui.innerHTML = "🎯 NOPEA VETO! Aarre löydetty!";
                ui.style.background = "green";
                
                // Suomenkielinen tekoälyääni onnittelee
                const msg = new SpeechSynthesisUtterance("Hienoa sheriffi! Löysit aarteen.");
                msg.lang = 'fi-FI';
                window.speechSynthesis.speak(msg);
            }
            lastY = y;
        });
    </script>
</body>
</html>
