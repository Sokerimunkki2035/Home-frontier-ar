<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Home Frontier AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <a-box id="treasure" position="0 0.5 -5" scale="0.5 0.5 0.5" material="color: gold;" 
               animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-box>

        <a-sphere id="enemy" position="2 1 -7" radius="0.3" material="color: red;"></a-sphere>
        
        <a-entity camera></a-entity>
    </a-scene>

    <div id="ui" style="position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.8); padding: 15px; font-family: sans-serif; border-radius: 10px; z-index: 1000;">
        Etsi kultainen arkku pimeästä...
    </div>

    <script>
        let lastY = 0;
        let ui = document.getElementById('ui');

        window.addEventListener('devicemotion', (event) => {
            let accel = event.accelerationIncludingGravity;
            if (!accel) return;
            
            let y = accel.y;
            if (Math.abs(y - lastY) > 18) { 
                ui.innerHTML = "🎯 OSUMA! Vaara torjuttu!";
                ui.style.background = "green";
                
                const msg = new SpeechSynthesisUtterance("Hienoa työtä! Kohde tuhottu.");
                msg.lang = 'fi-FI';
                window.speechSynthesis.speak(msg);
            }
            lastY = y;
        });
    </script>
</body>
</html>
